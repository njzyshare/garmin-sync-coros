name: garmin-sync-garmin

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'
    - cron: '15 15 * * *'
env:
  GITHUB_NAME: njzyshare
  GITHUB_EMAIL: feimummy@126.com
  ## 佳明中国区配置（源账号）
  GARMIN_AUTH_DOMAIN: ${{ secrets.GARMIN_AUTH_DOMAIN }}
  GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}

  ## 佳明国际区配置（目标账号）
  GARMIN_INTL_EMAIL: ${{ secrets.GARMIN_INTL_EMAIL }}
  GARMIN_INTL_PASSWORD: ${{ secrets.GARMIN_INTL_PASSWORD }}
  GARMIN_INTL_AUTH_DOMAIN: ${{ secrets.GARMIN_INTL_AUTH_DOMAIN }}

  ## 通用配置
  GARMIN_NEWEST_NUM: ${{ secrets.GARMIN_NEWEST_NUM }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Set Variables
        id: set_variables
        run: |
          echo "::set-output name=PY::$(python -c 'import hashlib, sys;print(hashlib.sha256(sys.version.encode()+sys.executable.encode()).hexdigest())')"
          echo "::set-output name=PIP_CACHE::$(pip cache dir)"
      - name: Cache PIP
        uses: actions/cache@v3
        with:
          path: ${{ steps.set_variables.outputs.PIP_CACHE }}
          key: Ubuntu-pip-${{ steps.set_variables.outputs.PY }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        if: steps.pip-cache.outputs.cache-hit != 'true'
      - name: Run Garmin Cross-Region Sync
        run: |
          python scripts/garmin/garmin_sync_garmin.py
      - name: Push new cookie
        run: |
          git config --local user.email "${{ env.GITHUB_EMAIL }}"
          git config --local user.name "${{ env.GITHUB_NAME }}"
          git add .
          git commit -m 'feat(sync): cross-region garmin sync' || echo "nothing to commit"
          git push || echo "nothing to push"
