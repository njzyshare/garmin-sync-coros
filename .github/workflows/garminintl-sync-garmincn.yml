name: garminintl-sync-garmincn

on:
  workflow_dispatch:
  schedule:
    - cron: '45 4 * * *'
    - cron: '45 15 * * *'
env:
  GITHUB_NAME: njzyshare
  GITHUB_EMAIL: feimummy@126.com
  ## 源账号（INTL 国际区）
  GARMIN_INTL_EMAIL: ${{ secrets.GARMIN_INTL_EMAIL }}
  GARMIN_INTL_PASSWORD: ${{ secrets.GARMIN_INTL_PASSWORD }}
  GARMIN_INTL_AUTH_DOMAIN: ${{ secrets.GARMIN_INTL_AUTH_DOMAIN }}

  ## 目标账号（CN 中国区）
  GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_AUTH_DOMAIN: ${{ secrets.GARMIN_AUTH_DOMAIN }}
  GARMIN_NEWEST_NUM: ${{ secrets.GARMIN_NEWEST_NUM }}

  # 启用 Node.js 24 运行 Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set Variables
        id: set_variables
        run: |
          echo "PY=$(python -c 'import hashlib, sys;print(hashlib.sha256(sys.version.encode()+sys.executable.encode()).hexdigest())')" >> $GITHUB_OUTPUT
          echo "PIP_CACHE=$(pip cache dir)" >> $GITHUB_OUTPUT
          echo "REQ_HASH=$(md5sum requirements.txt | cut -d' ' -f1)" >> $GITHUB_OUTPUT
      - name: Cache PIP
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ${{ steps.set_variables.outputs.PIP_CACHE }}
          key: Ubuntu-pip-${{ steps.set_variables.outputs.PY }}-${{ steps.set_variables.outputs.REQ_HASH }}
          restore-keys: |
            Ubuntu-pip-${{ steps.set_variables.outputs.PY }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download sync log
        uses: dawidd6/action-download-artifact@v6
        with:
          name: sync-log
          path: db/
          if_no_artifact_found: warn
      - name: Run Intl to Cn Sync
        run: |
          python scripts/garmin/intl_sync_cn.py
      - name: Upload sync log
        uses: actions/upload-artifact@v4
        with:
          name: sync-log
          path: db/sync_log.db
          overwrite: true
          retention-days: 1
      - name: Push new cookie
        run: |
          git config --local user.email "${{ env.GITHUB_EMAIL }}"
          git config --local user.name "${{ env.GITHUB_NAME }}"
          git add db/intl_cn.db
          git commit -m 'update intl cn sync' || echo "nothing to commit"
          git push || echo "nothing to push"
